name: "Deploy Backend — Azure Container Apps"

on:
  # Use deploy-all.yml para push automático com ordem garantida.
  # Este workflow existe para redeploy manual isolado do Backend.
  workflow_dispatch:

# OIDC token required for azure/login federated identity
permissions:
  id-token: write
  contents: read

env:
  IMAGE_NAME: accessmesh-backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Build Docker Image and Update Container App

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Azure login (OIDC / federated identity) ───────────────────
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ── 3. Authenticate Docker to ACR ────────────────────────────────
      - name: Log in to Azure Container Registry
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | docker login "${{ secrets.ACR_LOGIN_SERVER }}" \
            --username "${{ secrets.ACR_USERNAME }}" \
            --password-stdin

      # ── 4. Build Docker image (context = repo root) ──────────────────
      - name: Build and push Docker image
        run: |
          IMAGE_TAG="${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_ENV"

          docker build \
            --file backend/Dockerfile \
            --tag  "$IMAGE_TAG" \
            .

          docker push "$IMAGE_TAG"

          # Keep a `latest` tag for manual inspection / rollback reference
          docker tag "$IMAGE_TAG" "${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest"
          docker push "${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest"

      # ── 5. Update Container App with the new image ───────────────────
      - name: Deploy to Azure Container Apps
        run: |
          az containerapp update \
            --name            "${{ secrets.BACKEND_CONTAINER_APP_NAME }}" \
            --resource-group  "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --image           "${{ env.IMAGE_TAG }}"
