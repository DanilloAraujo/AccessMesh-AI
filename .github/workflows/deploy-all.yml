name: "Deploy All — Orchestrator (MCP → Backend → Frontend)"

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  # ── 1. MCP (sem dependências) ────────────────────────────────────────────
  deploy-mcp:
    name: "1/3 · MCP"
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: accessmesh-mcp

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | docker login "${{ secrets.ACR_LOGIN_SERVER }}" \
            --username "${{ secrets.ACR_USERNAME }}" \
            --password-stdin

      - name: Build and push MCP image
        run: |
          IMAGE_TAG="${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_ENV"

          docker build --file mcp/Dockerfile --tag "$IMAGE_TAG" .
          docker push "$IMAGE_TAG"

          docker tag "$IMAGE_TAG" "${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest"
          docker push "${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest"

      - name: Deploy MCP to Container Apps
        run: |
          echo "=== Subscriptions available ==="
          az account list --output table
          echo "=== Container Apps in resource group ==="
          az containerapp list \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --subscription   "${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            --output table || true
          echo "=== Deploying ==="
          az containerapp update \
            --name           "${{ secrets.MCP_CONTAINER_APP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --subscription   "${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            --image          "${{ env.IMAGE_TAG }}"

  # ── 2. Backend (espera MCP estar no ar) ──────────────────────────────────
  deploy-backend:
    name: "2/3 · Backend"
    runs-on: ubuntu-latest
    needs: deploy-mcp          # só executa se o job MCP passou
    env:
      IMAGE_NAME: accessmesh-backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | docker login "${{ secrets.ACR_LOGIN_SERVER }}" \
            --username "${{ secrets.ACR_USERNAME }}" \
            --password-stdin

      - name: Build and push Backend image
        run: |
          IMAGE_TAG="${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_ENV"

          docker build --file backend/Dockerfile --tag "$IMAGE_TAG" .
          docker push "$IMAGE_TAG"

          docker tag "$IMAGE_TAG" "${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest"
          docker push "${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest"

      - name: Deploy Backend to Container Apps
        run: |
          echo "=== Container Apps in resource group ==="
          az containerapp list \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --subscription   "${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            --output table || true
          echo "=== Deploying ==="
          az containerapp update \
            --name           "${{ secrets.BACKEND_CONTAINER_APP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --subscription   "${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            --image          "${{ env.IMAGE_TAG }}"

  # ── 3. Frontend (espera Backend estar no ar) ─────────────────────────────
  deploy-frontend:
    name: "3/3 · Frontend"
    runs-on: ubuntu-latest
    needs: deploy-backend      # só executa se o job Backend passou

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build and Deploy to Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend
          output_location: dist
          skip_api_build: true
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
